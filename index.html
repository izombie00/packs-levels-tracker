<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Packs</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 10px;
}

/* Pack container */
.pack {
  padding: 10px 5px;
}

/* Level rows */
.level {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #eee;
}

/* Input box */
.percent-input {
  width: 50px;
  font-size: 13px;
}

/* Progress bar */
.progress-bar {
  height: 6px;
  background: #eee;
  margin-top: 10px;
  border-radius: 4px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: #1a73e8;
  width: 0%;
}

/* Small text */
.progress-text {
  font-size: 13px;
  margin-top: 5px;
  color: #555;
}

  /* Difficulty tags */
.tag {
  display: inline-block;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: bold;
  color: white;
  border-radius: 6px;
  margin-right: 8px;
}

/* Difficulty colours */
.easy { background: #34a853; }      /* green */
.medium { background: #fbbc05; }    /* yellow/orange */
.hard { background: #ea4335; }      /* red */
.insane { background: #8b0000; }    /* dark red */
.extreme { background: #a142f4; }   /* purple */
</style>
</head>

<body>

<!-- BEGINNER PACK -->
<div class="pack">
  <h3><span class="tag easy">EASY</span> Beginner Demon Pack</h3>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  The Nightmare
</label>
    <span>
      <input type="number" class="percent-input" data-id="nightmare" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  THE LIGHTNING ROAD
</label>
    <span>
      <input type="number" class="percent-input" data-id="lightning" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  Platinum Adventure
</label>
    <span>
      <input type="number" class="percent-input" data-id="platinum" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <div class="progress-text"></div>
</div>


<!-- NINE CIRCLES PACK -->
<div class="pack">
  <h3><span class="tag hard">HARD</span> Nine Circles Pack</h3>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag hard">HARD</span>
  Nine Circles
</label>    <span>
      <input type="number" class="percent-input" data-id="ninecircles" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  Problematic
</label>
    <span>
      <input type="number" class="percent-input" data-id="problematic" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  Infinite Circles
</label>
    <span>
      <input type="number" class="percent-input" data-id="infinitecircles" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="level">
    <label>
  <input type="checkbox" data-id="nightmare-check">
  <span class="tag easy">EASY</span>
  Ultra Paracosm
</label>
    <span>
      <input type="number" class="percent-input" data-id="ultraparacosm" min="0" max="100" value="0">%
    </span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <div class="progress-text"></div>
</div>


<script>
const packs = document.querySelectorAll(".pack");

packs.forEach(pack => {
  const checkboxes = pack.querySelectorAll("input[type='checkbox']");
  const inputs = pack.querySelectorAll(".percent-input");
  const progressFill = pack.querySelector(".progress-fill");
  const progressText = pack.querySelector(".progress-text");

  // Load saved data
  inputs.forEach(input => {
    const saved = localStorage.getItem(input.dataset.id);
    if (saved !== null) input.value = saved;

    input.addEventListener("input", () => {
      let val = Math.max(0, Math.min(100, input.value));
      input.value = val;

      localStorage.setItem(input.dataset.id, val);

      const checkbox = input.closest(".level").querySelector("input[type='checkbox']");
      checkbox.checked = (val == 100);
      localStorage.setItem(checkbox.dataset.id, checkbox.checked);

      updatePack();
    });
  });

  checkboxes.forEach(cb => {
    const saved = localStorage.getItem(cb.dataset.id);
    if (saved === "true") cb.checked = true;

    cb.addEventListener("change", () => {
      localStorage.setItem(cb.dataset.id, cb.checked);

      const input = cb.closest(".level").querySelector(".percent-input");
      if (cb.checked) {
        input.value = 100;
        localStorage.setItem(input.dataset.id, 100);
      }

      updatePack();
    });
  });

  function updatePack() {
    let total = inputs.length;
    let sum = 0;

    inputs.forEach(input => {
      sum += Number(input.value);
    });

    const percent = sum / total;

    progressFill.style.width = percent + "%";
    progressText.textContent =
      `Average Progress: ${Math.round(percent)}%`;
  }

  updatePack();
});
</script>

</body>
</html>
